<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/navbar/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Document</title>
</head>
<nav class="navbar navbar-expand-lg fixed-top custom-navbar">
    <div class="container position-relative">

        <!-- Menú izquierdo -->
        <div class="d-flex gap-4 nav-left">
            <a class="nav-link text-uppercase" href="#">Tienda</a>
            <a class="nav-link text-uppercase" href="#">Colecciones</a>
            <a class="nav-link text-uppercase" href="#">Acerca de nosotros</a>
            <a class="nav-link text-uppercase" href="#">Contacto</a>
        </div>

        <!-- Logo centrado -->
        <a class="navbar-brand logo position-absolute start-50 translate-middle-x" href="#">
            RODAMA
        </a>

        <!-- Iconos derecha -->
        <div class="d-flex align-items-center gap-3 position-relative">

            <!-- Input oculto -->
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar productos...">

            <!-- Icono lupa -->
            <a href="#" id="searchToggle">
                <i class="bi bi-search fs-5"></i>
            </a>

            <a href="#"><i class="bi bi-person-fill fs-5"></i></a>
            <a href="#"><i class="bi bi-bag fs-5"></i></a>

        </div>

    </div>
</nav>

<body>
    <main>
        <!-- Contenido para probar scroll -->
        <div class="content">
            <h1>Contenido</h1>
        </div>

    </main>
    <script>
        window.addEventListener("scroll", function () {
            const navbar = document.querySelector(".custom-navbar");
            navbar.classList.toggle("scrolled", window.scrollY > 50);
        });
    </script>
    <script>
        const toggle = document.getElementById("searchToggle");
        const input = document.getElementById("searchInput");

        // función de búsqueda
        function buscar() {
            const valor = input.value.trim();

            if (valor !== "") {
                console.log("Buscando:", valor);

                // 👉 aquí conectas tu lógica real
                // window.location.href = "/buscar?q=" + encodeURIComponent(valor);
            }
        }

        // abrir/cerrar input
        toggle.addEventListener("click", function (e) {
            e.preventDefault();
            input.classList.toggle("active");

            if (input.classList.contains("active")) {
                input.focus();
            }
        });

        // ENTER para buscar
        input.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                buscar();
            }
        });

        // cerrar si haces click fuera
        document.addEventListener("click", function (e) {
            if (!input.contains(e.target) && !toggle.contains(e.target)) {
                input.classList.remove("active");
            }
        });
    </script>
</body>

</html>
