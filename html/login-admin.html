<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="../css/login-admin.css" />
  </head>
  <body>
    <div class="container-admin">
      <div id="modal">
        <div class="registro-admin">
          <button id="cerrar-modal" type="button">✕</button>
          <h1>Registro de Administrador</h1>

          <form id="form-registro">
            <div class="campo">
              <label for="nombre_completo">Usuario</label>
              <input
                type="text"
                id="nombre_completo"
                name="nombre_completo"
                placeholder="Ingresa tu nombre Usuario"
              />
            </div>

            <div class="campo">
              <label for="telefono">Teléfono</label>
              <input
                type="tel"
                id="telefono"
                name="telefono"
                placeholder="Ingresa tu número de teléfono"
              />
            </div>

            <div class="campo">
              <label for="correo">Correo electrónico</label>
              <input
                type="email"
                id="correo"
                name="correo"
                placeholder="Ingresa tu correo electrónico"
              />
            </div>

            <div class="campo">
              <label for="registropassword">Contraseña</label>
              <input
                type="password"
                id="registropassword"
                name="resgistropassword"
                placeholder="Crea una contraseña"
              />
            </div>

            <div class="campo">
              <label for="confirmar_password">Confirmar contraseña</label>
              <input
                type="password"
                id="confirmar_password"
                name="confirmar_password"
                placeholder="Confirma tu contraseña"
              />
            </div>

            <button type="submit" id="btn-registrar">Registrar</button>
          </form>
        </div>
      </div>
      <a href="../index.html" class="back-link">
        <i class="bi bi-arrow-left"></i>
        Volver a la tienda
      </a>

      <div class="login-card">
        <div class="logo-container">
          <div class="logo-circle">
            <i class="bi bi-shield"></i>
          </div>
        </div>

        <h1 class="title">Rodama Admin</h1>
        <p class="subtitle">Panel de administración</p>

        <form class="form-group" id="form">
          <label class="form-label">Usuario</label>
          <div class="custom-input m">
            <span class="input-icon">
              <i class="bi bi-person"></i>
            </span>
            <input
              type="text"
              id="user"
              placeholder="Ingresa tu usuario"
              required
            />
          </div>
          <label class="form-label">Contraseña</label>
          <div class="custom-input">
            <span class="input-icon">
              <i class="bi bi-lock"></i>
            </span>
            <input
              type="password"
              id="password"
              placeholder="Ingresa tu contraseña"
              required
            />
            <span class="input-icon right">
              <i class="bi bi-eye-slash" id="eye"></i>
            </span>
          </div>
          <button type="button" class="btn-login" id="btn-login">
            INICIAR SESIÓN
          </button>
          <button type="button" class="btn-login" id="btn-abrir-registro">
            REGISTRAR
          </button>
          <p>¿No estas registrado?</p>
        </form>
      </div>
    </div>
    <script src="../js/login-admin.js"></script>
  </body>
</html>
