<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Iniciar sesión | RODAMA</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/login.css">
</head>

<body>
  <main class="auth-page">
    <section class="auth-image">
      <img src="../img/foto-registro-inicio.png" alt="Moda RODAMA">
    </section>

    <section class="auth-panel">
      <div class="auth-card">
        <a href="../index.html" class="back-link">
          <i class="bi bi-arrow-left"></i>
          Volver a la tienda
        </a>

        <img src="../img/RODAMA_LOGO.png" alt="RODAMA" class="auth-logo">

        <p class="eyebrow">TU ESTILO, TU ESPACIO</p>
        <h1>Bienvenida de nuevo</h1>

        <p class="intro">
          Ingresa para continuar con tu experiencia de compra.
        </p>

        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label" for="correo">Correo o usuario</label>

            <div class="custom-input">
              <span class="input-icon">
                <i class="bi bi-envelope"></i>
              </span>

              <input
                type="text"
                id="correo"
                class="form-control"
                placeholder="correo@ejemplo.com"
                autocomplete="username"
              >
            </div>
          </div>

          <div class="mb-4">
            <label class="form-label" for="password">Contraseña</label>

            <div class="custom-input">
              <span class="input-icon">
                <i class="bi bi-lock"></i>
              </span>

              <input
                type="password"
                id="password"
                class="form-control"
                placeholder="Tu contraseña"
                autocomplete="current-password"
              >

              <span class="input-icon right">
                <i class="bi bi-eye-slash" id="eye"></i>
              </span>
            </div>
          </div>

          <button type="submit" class="btn-login">
            Iniciar sesión
          </button>
        </form>

        <p class="register-text">
          ¿No tienes una cuenta?
          <a href="register.html">Crear cuenta</a>
        </p>
      </div>
    </section>
  </main>

  <script src="../js/login.js"></script>
</body>
</html>
