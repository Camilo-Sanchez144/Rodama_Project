<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Crear cuenta | RODAMA</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="../css/register.css">

</head>

<body>

    <div class="container-fluid">

        <div class="row min-vh-100">

            <div class="col-lg-6 d-none d-lg-block p-0">

                <img src="../img/register-banner.jpg"
                    class="img-fluid w-100 h-100 object-fit-cover"
                    alt="RODAMA">

            </div>

            <div class="col-lg-6 d-flex align-items-center justify-content-center">

                <div class="register-card shadow">

                    <a href="../index.html" class="back-link">

                        <i class="bi bi-arrow-left"></i>

                        Volver a la tienda

                    </a>

                    <div class="text-center mb-4">

                        <img src="../img/RODAMA_LOGO.png"
                            alt="RODAMA"
                            class="logo">

                    </div>

                    <h2 class="title">

                        ¡Bienvenida a RODAMA!

                    </h2>

                    <p class="subtitle">

                        Crea tu cuenta y disfruta de una experiencia elegante, segura y personalizada.

                    </p>

                    <form id="registerForm">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">Nombre</label>

                                <input
                                    type="text"
                                    id="nombre"
                                    class="form-control">

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">Apellido</label>

                                <input
                                    type="text"
                                    id="apellido"
                                    class="form-control">

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Teléfono

                            </label>

                            <input
                                type="tel"
                                id="telefono"
                                class="form-control">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Dirección

                            </label>

                            <input
                                type="text"
                                id="direccion"
                                class="form-control">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Correo electrónico

                            </label>

                            <input
                                type="email"
                                id="correo"
                                class="form-control">

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Contraseña

                            </label>

                            <input
                                type="password"
                                id="password"
                                class="form-control">

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Confirmar contraseña

                            </label>

                            <input
                                type="password"
                                id="confirmPassword"
                                class="form-control">

                        </div>

                        <button
                            type="submit"
                            class="btn-register">

                            Crear cuenta

                        </button>

                    </form>

                    <p class="login-text">

                        ¿Ya tienes una cuenta?

                        <a href="login.html">

                            Inicia sesión

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

    <script src="../js/register.js"></script>

</body>

</html>
