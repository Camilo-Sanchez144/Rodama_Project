<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Crear cuenta | RODAMA</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="../css/register.css">
</head>

<body>
  <main class="auth-page">
    <section class="auth-image">
      <img src="../img/foto-registro-inicio.png" alt="Moda RODAMA">
    </section>

    <section class="auth-panel">
      <div class="auth-card register-card">
        <a href="../index.html" class="back-link">
          <i class="bi bi-arrow-left"></i>
          Volver a la tienda
        </a>

        <img src="../img/RODAMA_LOGO.png" alt="RODAMA" class="auth-logo">

        <p class="eyebrow">CREA TU ESPACIO</p>
        <h1>Únete a RODAMA</h1>

        <p class="intro">
          Completa tus datos para disfrutar una experiencia personalizada.
        </p>

        <form id="registerForm">
          <div class="form-grid">
            <div>
              <label for="nombre">Nombre</label>
              <input type="text" id="nombre" name="nombre">
            </div>

            <div>
              <label for="apellido">Apellido</label>
              <input type="text" id="apellido" name="apellido">
            </div>
          </div>

          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" name="telefono">

          <label for="direccion">Dirección</label>
          <input type="text" id="direccion" name="direccion">

          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" name="correo">

          <div class="form-grid">
            <div>
              <label for="password">Contraseña</label>
              <input type="password" id="password" name="password">
            </div>

            <div>
              <label for="confirmPassword">Confirmar contraseña</label>
              <input type="password" id="confirmPassword" name="confirmPassword">
            </div>
          </div>

          <button type="submit" class="btn-register">
            Crear cuenta
          </button>
        </form>

        <p class="login-text">
          ¿Ya tienes cuenta?
          <a href="login.html">Iniciar sesión</a>
        </p>
      </div>
    </section>
  </main>

  <script src="../js/register.js"></script>
</body>
</html>
