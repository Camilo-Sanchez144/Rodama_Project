<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catálogo de Productos | Rodama</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/productos.css" />
  </head>
  <body>
    <nav class="custom-navbar">
      <div class="nav-container">
        <img src="../img/RODAMA_LOGO.png" alt="RODAMA" class="logo-img" />

        <ul class="nav-links">
          <li><a href="../index.html">Tienda</a></li>
          <li><a href="../html/productos.html">Colecciones</a></li>
          <li>
            <a href="../html/acerca-de-nosotros.html">Acerca de nosotros</a>
          </li>
          <li><a href="../html/contacto.html">Contacto</a></li>
        </ul>

        <div class="nav-icons">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Buscar productos..."
          />
          <a href="#" id="searchToggle" title="Buscar"
            ><i class="bi bi-search"></i
          ></a>
          <a href="../html/login-admin.html" title="Cuenta"
            ><i class="bi bi-person-fill"></i
          ></a>
          <a href="#" title="Carrito"><i class="bi bi-bag"></i></a>

          <button class="hamburger" id="hamburger" aria-label="Abrir menú">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </div>

      <div class="mobile-menu" id="mobileMenu">
        <ul>
          <li><a href="../index.html">Tienda</a></li>
          <li><a href="../html/productos.html">Colecciones</a></li>
          <li>
            <a href="../html/acerca-de-nosotros.html">Acerca de nosotros</a>
          </li>
          <li><a href="../html/contacto.html">Contacto</a></li>
        </ul>
      </div>
    </nav>

    <section class="catalog-header">
      <div class="container">
        <p class="catalog-subtitle">Colección femenina</p>
        <h1 class="catalog-title">Nuestros Productos</h1>
        <p class="catalog-text">
          Descubre prendas elegantes, versátiles y modernas para elevar tu
          estilo en cada ocasión.
        </p>
      </div>
    </section>

    <section class="catalog-section">
      <div class="container">
        <div class="catalog-toolbar">
          <div class="search-box">
            <input
              type="text"
              id="searchInput"
              class="form-control"
              placeholder="Buscar por nombre, categoría o descripción"
            />
          </div>

          <div class="filter-box">
            <select id="categoryFilter" class="form-select">
              <option value="all">Todas las categorías</option>
              <option value="Blusas">Blusas</option>
              <option value="Camisas">Camisas</option>
              <option value="Vestidos">Vestidos</option>
              <option value="Faldas">Faldas</option>
              <option value="Pantalones">Pantalones</option>
              <option value="Sets / Conjuntos">Sets / Conjuntos</option>
              <option value="Accesorios">Accesorios</option>
            </select>
          </div>
        </div>

        <div class="row g-4" id="productContainer"></div>
      </div>
    </section>

    <script src="../js/productos.js"></script>
    <script src="../js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
