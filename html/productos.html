<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Productos | Rodama</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/productos.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg catalog-navbar">
    <div class="container">
      <a class="navbar-brand" href="#">Rodama Store</a>
    </div>
  </nav>

  <section class="catalog-header">
    <div class="container">
      <p class="catalog-subtitle">Colección femenina</p>
      <h1 class="catalog-title">Nuestros Productos</h1>
      <p class="catalog-text">
        Descubre prendas elegantes, versátiles y modernas para elevar tu estilo en cada ocasión.
      </p>
    </div>
  </section>

  <section class="catalog-section">
    <div class="container">

      <div class="catalog-toolbar">
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            class="form-control"
            placeholder="Buscar por nombre, categoría o descripción">
        </div>

        <div class="filter-box">
          <select id="categoryFilter" class="form-select">
            <option value="all">Todas las categorías</option>
            <option value="Blusas">Blusas</option>
            <option value="Camisas">Camisas</option>
            <option value="Vestidos">Vestidos</option>
            <option value="Faldas">Faldas</option>
            <option value="Pantalones">Pantalones</option>
            <option value="Sets / Conjuntos">Sets / Conjuntos</option>
            <option value="Accesorios">Accesorios</option>
          </select>
        </div>
      </div>

      <div class="row g-4" id="productContainer"></div>
    </div>
  </section>

  <script src="../js/productos.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
