<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../css/cart.css">
  <link rel="stylesheet" href="../css/user-menu.css">
</head>

<body>

  <nav class="custom-navbar">

    <div class="nav-container">

      <img src="../img/RODAMA_LOGO.png" alt="RODAMA" class="logo-img">

      <ul class="nav-links">
        <li><a href="../index.html">Tienda</a></li>
        <li><a href="../html/productos.html">Colecciones</a></li>
        <li><a href="../html/acerca-de-nosotros.html">Acerca de nosotros</a></li>
        <li><a href="../html/contacto.html">Contacto</a></li>
      </ul>

      <div class="nav-icons">

        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Buscar productos...">

        <a href="#" id="searchToggle" title="Buscar">
          <i class="bi bi-search"></i>
        </a>

        <a href="./login-admin.html" id="adminAccess">
          <i class="bi bi-person-fill"></i>
        </a>

        
        <a href="./cart.html" class="cart-icon" title="Carrito">
          <i class="bi bi-bag"></i>
          <span id="cartCount" class="cart-count">0</span>
        </a>

        <button class="hamburger" id="hamburger" aria-label="Abrir menú">
          <span></span>
          <span></span>
          <span></span>
        </button>

      </div>

    </div>

    <div class="mobile-menu" id="mobileMenu">
      <ul>
        <li><a href="../index.html">Tienda</a></li>
        <li><a href="../html/productos.html">Colecciones</a></li>
        <li><a href="../html/acerca-de-nosotros.html">Acerca de nosotros</a></li>
        <li><a href="../html/contacto.html">Contacto</a></li>
      </ul>
    </div>

  </nav>

  <section class="cart-section">

    <div class="container">

      <div class="cart-header">
        <span class="cart-subtitle">Tu selección</span>
        <h1 class="cart-title">Carrito de compras</h1>
      </div>

      <div class="cart-layout">

        <div id="cartItemsContainer" class="cart-items"></div>

        <aside class="cart-summary" id="cartSummary">

          <h3 class="summary-title">Resumen</h3>

          <div class="summary-row">
            <span>Subtotal</span>
            <span id="cartSubtotal">$0</span>
          </div>
          <div class="summary-row total-row">
            <span>Total</span>
            <span id="cartTotal">$0</span>
          </div>

          <button class="btn-checkout" id="btnCheckout">
            Finalizar compra
          </button>

        </aside>

      </div>

    </div>

  </section>
  <footer class="border-top py-4">
    <div class="container text-center">
      <div class="mb-3">
        <a href="https://www.facebook.com/" class="social-link mx-2 fs-5">
          <i class="bi bi-facebook"></i>
        </a>
        <a href="https://www.instagram.com/" class="social-link mx-2 fs-5">
          <i class="bi bi-instagram"></i>
        </a>
        <a href="https://x.com/" class="social-link mx-2 fs-5">
          <i class="bi bi-twitter-x"></i>
        </a>
        <a href="https://www.linkedin.com/" class="social-link mx-2 fs-5">
          <i class="bi bi-linkedin"></i>
        </a>
      </div>
      <small class="text-muted">
        © 2026 RODAMA. Todos los derechos reservados.
      </small>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/script.js"></script>
  <script src="../js/cart.js"></script>

</body>

</html>
